<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>TIGER 999 — Scan</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0f1117;--card:#1a1d27;--card2:#222533;--border:#2e3248;--gold:#f5c518;--gold2:#c9a010;--white:#f0f2ff;--gray:#6b7280;--lg:#9ca3af;--green:#27ae60;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;max-width:500px;margin:0 auto;display:flex;flex-direction:column;align-items:center;padding:20px 16px;}
.logo{font-size:40px;margin-bottom:6px;margin-top:8px;}
.title{font-size:22px;font-weight:900;color:var(--gold);margin-bottom:4px;}
.sub{font-size:13px;color:var(--lg);margin-bottom:20px;text-align:center;line-height:1.6;}

/* mode tabs */
.mode-tabs{display:flex;gap:8px;width:100%;margin-bottom:16px;}
.mode-tab{flex:1;padding:10px;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--lg);font-family:'Sarabun',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;}
.mode-tab.on{border-color:var(--gold);color:var(--gold);background:rgba(245,197,24,.08);}

/* upload zone */
.upload-zone{width:100%;background:var(--card);border:2px dashed var(--border);border-radius:18px;padding:28px 20px;text-align:center;cursor:pointer;position:relative;display:none;}
.upload-zone.active{display:block;}
.upload-zone.drag{border-color:var(--gold);background:rgba(245,197,24,.06);}
.upload-icon{font-size:44px;margin-bottom:10px;}
.upload-txt{font-size:17px;font-weight:800;color:var(--white);margin-bottom:4px;}
.upload-sub{font-size:12px;color:var(--lg);}
#file-inp{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;}

/* camera */
.cam-wrap{width:100%;display:none;flex-direction:column;align-items:center;gap:10px;}
.cam-wrap.active{display:flex;}
.cam-box{width:100%;max-width:400px;position:relative;border-radius:16px;overflow:hidden;background:#000;}
#cam-video{width:100%;display:block;border-radius:16px;}
.cam-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.cam-frame{width:60%;aspect-ratio:1;border:3px solid var(--gold);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.45);}
.cam-hint{font-size:13px;color:var(--lg);text-align:center;}
.cam-stop-btn{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--card2);color:var(--lg);font-family:'Sarabun',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}

/* preview */
.preview-wrap{width:100%;margin-top:12px;display:none;}
.preview-img{width:100%;border-radius:12px;border:2px solid var(--border);}

/* status */
.status{width:100%;margin-top:12px;padding:14px;border-radius:12px;font-size:15px;font-weight:800;text-align:center;display:none;}
.status.scanning{background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.3);color:var(--gold);}
.status.success{background:rgba(39,174,96,.12);border:1px solid rgba(39,174,96,.4);color:#6ee7b7;}
.status.error{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:#fca5a5;}

/* result */
.result-box{width:100%;margin-top:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:none;}
.result-title{font-size:12px;font-weight:700;color:var(--lg);margin-bottom:6px;}
.result-info{font-size:14px;font-weight:800;color:var(--white);line-height:1.9;}
.result-info span{color:var(--gold);}

.go-btn{width:100%;margin-top:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:12px;color:#111;font-family:'Sarabun',sans-serif;font-size:19px;font-weight:900;padding:14px;cursor:pointer;display:none;}
.reset-btn{width:100%;margin-top:8px;background:var(--card2);border:1px solid var(--border);border-radius:12px;color:var(--lg);font-family:'Sarabun',sans-serif;font-size:14px;font-weight:800;padding:11px;cursor:pointer;display:none;}
.tip{margin-top:20px;font-size:12px;color:var(--gray);text-align:center;line-height:1.7;}
</style>
</head>
<body>

<div class="logo">🐯</div>
<div class="title">TIGER 999 — Scan</div>
<div class="sub">รับข้อมูลโพยจาก QR code<br>เข้า Desktop อัตโนมัติ</div>

<div class="mode-tabs">
  <button class="mode-tab on" id="tab-upload" onclick="switchMode('upload')">📁 อัพรูป</button>
  <button class="mode-tab" id="tab-cam" onclick="switchMode('cam')">📷 กล้อง</button>
</div>

<!-- Upload mode -->
<div class="upload-zone active" id="upload-zone">
  <input type="file" id="file-inp" accept="image/*" multiple>
  <div class="upload-icon">🖼️</div>
  <div class="upload-txt">แตะเพื่อเลือกรูป (เลือกได้หลายรูป)</div>
  <div class="upload-sub">JPG, PNG, WebP — screenshot จาก Line ได้เลย</div>
</div>

<!-- Camera mode -->
<div class="cam-wrap" id="cam-wrap">
  <div class="cam-box">
    <video id="cam-video" autoplay playsinline muted></video>
    <div class="cam-overlay"><div class="cam-frame"></div></div>
  </div>
  <div class="cam-hint">จ่อ QR ให้อยู่ในกรอบ — ระบบ scan อัตโนมัติ</div>
  <button class="cam-stop-btn" onclick="stopCamera()">⏹ หยุดกล้อง</button>
</div>

<div class="preview-wrap" id="preview-wrap" style="display:none;">
  <!-- Carousel -->
  <div style="position:relative;">
    <img class="preview-img" id="preview-img" src="" alt="" style="width:100%;border-radius:10px;display:block;">
    <!-- nav buttons -->
    <button id="prev-btn" onclick="carouselNav(-1)" style="display:none;position:absolute;left:6px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.6);border:none;border-radius:50%;width:36px;height:36px;color:#fff;font-size:18px;cursor:pointer;z-index:10;">‹</button>
    <button id="next-btn" onclick="carouselNav(1)" style="display:none;position:absolute;right:6px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.6);border:none;border-radius:50%;width:36px;height:36px;color:#fff;font-size:18px;cursor:pointer;z-index:10;">›</button>
    <!-- badge -->
    <div id="carousel-badge" style="display:none;position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);color:#fff;font-size:12px;font-weight:800;padding:3px 10px;border-radius:20px;font-family:'Sarabun',sans-serif;"></div>
    <!-- status badge per image -->
    <div id="carousel-status" style="position:absolute;top:8px;right:8px;font-size:12px;font-weight:800;padding:3px 10px;border-radius:20px;font-family:'Sarabun',sans-serif;"></div>
  </div>
  <!-- dots -->
  <div id="carousel-dots" style="display:flex;justify-content:center;gap:6px;margin-top:8px;"></div>
</div>

<div class="status" id="status"></div>

<div class="result-box" id="result-box">
  <div class="result-title">ข้อมูลที่อ่านได้</div>
  <div class="result-info" id="result-info"></div>
</div>

<button class="go-btn" id="go-btn">📥 นำเข้ารายการ</button>
<button class="reset-btn" id="reset-btn">🔄 scan ใหม่</button>

<div class="tip" id="tip-txt">💡 screenshot โพยจาก Line แล้วอัพขึ้นมาได้เลย</div>

<canvas id="qr-canvas" style="display:none;"></canvas>

<script>
var _qrUrl = null;
var _camStream = null;
var _camRaf = null;
var _curMode = 'upload';
var _pendingFiles = [];   // ไฟล์ที่รอ scan
var _scannedResults = []; // ผล scan ทั้งหมด
var _currentFileIdx = 0;

// ── MODE SWITCH ──
function switchMode(m){
  _curMode = m;
  document.getElementById('tab-upload').className = 'mode-tab'+(m==='upload'?' on':'');
  document.getElementById('tab-cam').className = 'mode-tab'+(m==='cam'?' on':'');
  document.getElementById('upload-zone').className = 'upload-zone'+(m==='upload'?' active':'');
  document.getElementById('cam-wrap').className = 'cam-wrap'+(m==='cam'?' active':'');
  document.getElementById('tip-txt').textContent = m==='cam'
    ? '💡 จ่อกล้องไปที่ QR บนหน้าจอหรือรูปพิมพ์ได้เลย'
    : '💡 screenshot โพยจาก Line แล้วอัพขึ้นมาได้เลย';
  resetResult();
  if(m==='cam') startCamera();
  else stopCamera();
}

// ── UPLOAD MODE ──
document.getElementById('file-inp').addEventListener('change', function(e){
  var files = Array.from(e.target.files).filter(function(f){ return f.type.startsWith('image/'); });
  if(files.length) startBatchScan(files);
});
var zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', function(e){ e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', function(){ zone.classList.remove('drag'); });
zone.addEventListener('drop', function(e){
  e.preventDefault(); zone.classList.remove('drag');
  var files = Array.from(e.dataTransfer.files).filter(function(f){ return f.type.startsWith('image/'); });
  if(files.length) startBatchScan(files);
});

function startBatchScan(files){
  _pendingFiles = files;
  _scannedResults = [];
  _currentFileIdx = 0;
  _carouselIdx = 0;
  _carouselSrcs = [];
  resetResult();
  setStatus('scanning', '🔍 กำลัง scan รูปที่ 1/'+files.length+'...');
  scanNextFile();
}

var _carouselIdx = 0;
var _carouselSrcs = []; // {src, status, label}

function scanNextFile(){
  if(_currentFileIdx >= _pendingFiles.length){
    showBatchResult();
    return;
  }
  var file = _pendingFiles[_currentFileIdx];
  var reader = new FileReader();
  reader.onload = function(ev){
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function(){
      setTimeout(function(){
      var result = scanFromImage(img);
      var ok = result && result.imp;
      _scannedResults.push({file: file.name, idx: _currentFileIdx+1, result: result});
      _carouselSrcs.push({
        src: ev.target.result,
        ok: ok,
        label: ok ? '✅ '+result.cnt+' รายการ' : '❌ อ่านไม่ได้'
      });
      // แสดง carousel
      document.getElementById('preview-wrap').style.display = 'block';
      _carouselIdx = _carouselSrcs.length - 1;
      updateCarousel();
      _currentFileIdx++;
      if(_currentFileIdx < _pendingFiles.length){
        setStatus('scanning','🔍 กำลัง scan รูปที่ '+(_currentFileIdx+1)+'/'+_pendingFiles.length+'...');
      }
      scanNextFile();
      },50); // setTimeout ให้ UI update ก่อน
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function updateCarousel(){
  var srcs = _carouselSrcs;
  if(!srcs.length) return;
  var i = _carouselIdx;
  var item = srcs[i];
  document.getElementById('preview-img').src = item.src;

  var badge = document.getElementById('carousel-badge');
  badge.style.display = srcs.length > 1 ? 'block' : 'none';
  badge.textContent = (i+1)+'/'+srcs.length;

  var sBadge = document.getElementById('carousel-status');
  sBadge.textContent = item.label;
  sBadge.style.background = item.ok ? 'rgba(34,197,94,.85)' : 'rgba(239,68,68,.85)';

  document.getElementById('prev-btn').style.display = srcs.length > 1 ? 'block' : 'none';
  document.getElementById('next-btn').style.display = srcs.length > 1 ? 'block' : 'none';

  // dots
  var dots = document.getElementById('carousel-dots');
  dots.innerHTML = srcs.map(function(s,idx){
    return '<div onclick="carouselGo('+idx+')" style="width:8px;height:8px;border-radius:50%;cursor:pointer;background:'
      +(idx===i?'#f5c518':(s.ok?'#22c55e':'#ef4444'))+'"></div>';
  }).join('');
}

function carouselNav(dir){
  var len = _carouselSrcs.length;
  _carouselIdx = (_carouselIdx + dir + len) % len;
  updateCarousel();
}

function carouselGo(idx){
  _carouselIdx = idx;
  updateCarousel();
}

function showBatchResult(){
  var ok = _scannedResults.filter(function(r){ return r.result && r.result.imp; });
  var fail = _scannedResults.filter(function(r){ return !r.result || !r.result.imp; });
  var totalEntries = ok.reduce(function(s,r){ return s + (r.result.cnt||0); }, 0);
  var totalBaht = ok.reduce(function(s,r){ return s + (r.result.total||0); }, 0);

  if(ok.length === 0){
    setStatus('error', '❌ ไม่พบ QR ในรูปที่เลือก');
    document.getElementById('reset-btn').style.display='block';
    return;
  }

  var info = '<span>สแกนสำเร็จ</span> '+ok.length+'/'+_scannedResults.length+' รูป<br>'
    +'<span>รวมทั้งหมด</span> '+totalEntries+' รายการ'
    +(totalBaht?'  <span style="color:var(--gold);font-weight:900;">฿'+totalBaht.toLocaleString()+'</span>':'');
  if(fail.length){
    info += '<br><span style="color:#f87171;">อ่านไม่ได้</span> '+fail.map(function(r){return 'รูปที่ '+r.idx;}).join(', ');
  }
  ok.forEach(function(r){
    info += '<br>📄 รูปที่ '+r.idx+' — '+r.result.cnt+' รายการ'+(r.result.total?' ฿'+r.result.total.toLocaleString():'');
  });

  document.getElementById('result-info').innerHTML = info;
  document.getElementById('result-box').style.display='block';
  setStatus('success','✅ scan เสร็จ! พบ '+totalEntries+' รายการจาก '+ok.length+' รูป');
  // เก็บ imports ทั้งหมดไว้ใน _qrUrl เป็น array
  _qrUrl = ok.map(function(r){ return r.result.imp; });
  document.getElementById('go-btn').style.display='block';
  document.getElementById('reset-btn').style.display='block';
}

function handleFile(file){
  startBatchScan([file]);
}

function scanFromImage(img){
  var canvas = document.getElementById('qr-canvas');
  var ctx = canvas.getContext('2d', {willReadFrequently: true});
  var origW = img.naturalWidth || img.width || 0;
  var origH = img.naturalHeight || img.height || 0;
  if(!origW || !origH) return null; // ป้องกัน canvas = 0
  var scales = [{w:origW,h:origH}];
  if(origW > 1200) scales.push({w:1200, h:Math.round(origH*1200/origW)});
  if(origW > 800)  scales.push({w:800,  h:Math.round(origH*800/origW)});
  scales.push({w:400, h:Math.round(origH*400/origW)});
  for(var i=0;i<scales.length;i++){
    var w=scales[i].w, h=scales[i].h;
    if(!w||!h) continue;
    canvas.width=w; canvas.height=h;
    ctx.drawImage(img,0,0,w,h);
    var imageData;
    try{ imageData=ctx.getImageData(0,0,w,h); }catch(e){ continue; }
    if(!imageData||!imageData.data||imageData.data.length<4) continue;
    var iw=imageData.width, ih=imageData.height;
    if(!iw||!ih) continue;
    var code;
    try{
      code=jsQR(imageData.data,iw,ih,{inversionAttempts:'dontInvert'});
      if(!code) code=jsQR(imageData.data,iw,ih,{inversionAttempts:'onlyInvert'});
    }catch(e){ continue; }
    if(code) return parseQRResult(code.data);
  }
  return null;
}

function parseQRResult(url){
  var imp = null;
  url = url.trim();
  // format 1: T999:base64
  if(url.indexOf('T999:') === 0){
    imp = url.slice(5);
  }
  // format 2: URL มี import= param
  else if(url.indexOf('import=') >= 0){
    imp = url.split('import=')[1];
  }
  // format 3: base64 ล้วนๆ
  else if(/^[A-Za-z0-9+/=]+$/.test(url)){
    imp = url;
  }
  if(!imp) return null;
  try{
    var data = JSON.parse(decodeURIComponent(escape(atob(imp))));
    var norm = normalizeData(data);
    var ents = norm.entries||[];
    var total = ents.reduce(function(s,e){
      var b=e.bon||e.b||0, t=e.tod||e.t||0, l=e.lang||e.la||0, n=e.na||e.n||0;
      var kd=e.kd||{};
      var kb=(kd.bon||[]).reduce(function(s2,x){return s2+(x.price||0);},0);
      var kl=(kd.lang||[]).reduce(function(s2,x){return s2+(x.price||0);},0);
      var kn=(kd.na||[]).reduce(function(s2,x){return s2+(x.price||0);},0);
      var pk=(e.paks||e.pk||[]).reduce(function(s2,x){return s2+(x.price||x.pr||0);},0);
      return s+b+t+l+n+kb+kl+kn+pk;
    },0);
    return {imp: imp, cnt: ents.length, total: total, ngod: norm.ngod||'', sender: norm.sender||'', pg: norm.pg||1};
  } catch(e){ return null; }
}

// ── CAMERA MODE ──
function startCamera(){
  if(!navigator.mediaDevices){ setStatus('error','❌ browser นี้ไม่รองรับกล้อง'); return; }
  setStatus('scanning','🎥 เปิดกล้อง...');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}})
  .then(function(stream){
    _camStream = stream;
    var v = document.getElementById('cam-video');
    v.srcObject = stream;
    v.onloadedmetadata = function(){ v.play(); document.getElementById('status').style.display='none'; scanLoop(); };
  })
  .catch(function(){ setStatus('error','❌ ไม่สามารถเปิดกล้องได้'); });
}

function stopCamera(){
  if(_camRaf){ cancelAnimationFrame(_camRaf); _camRaf=null; }
  if(_camStream){ _camStream.getTracks().forEach(function(t){t.stop();}); _camStream=null; }
  var v = document.getElementById('cam-video');
  v.srcObject = null;
}

function scanLoop(){
  var v = document.getElementById('cam-video');
  if(!v.videoWidth){ _camRaf=requestAnimationFrame(scanLoop); return; }
  var canvas = document.getElementById('qr-canvas');
  var ctx = canvas.getContext('2d', {willReadFrequently: true});
  canvas.width = v.videoWidth; canvas.height = v.videoHeight;
  ctx.drawImage(v, 0, 0);
  var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  var code = jsQR(imageData.data, canvas.width, canvas.height, {inversionAttempts:'dontInvert'});
  if(code){
    stopCamera();
    handleQRResult(code.data);
    return;
  }
  _camRaf = requestAnimationFrame(scanLoop);
}

// ── RESULT ──
function handleQRResult(url){
  var result = parseQRResult(url);
  if(!result){
    setStatus('error','❌ QR นี้ไม่ใช่โพย Tiger 999');
    document.getElementById('reset-btn').style.display='block';
    return;
  }
  document.getElementById('result-info').innerHTML =
    '<span>แผ่น</span> '+result.pg
    +'  <span>จำนวน</span> '+result.cnt+' รายการ'
    +(result.total?'  <span style="color:var(--gold);font-weight:900;">฿'+result.total.toLocaleString()+'</span>':'');
  document.getElementById('result-box').style.display='block';
  setStatus('success','✅ อ่าน QR สำเร็จ! พบ '+result.cnt+' รายการ');
  _qrUrl = url;
  document.getElementById('go-btn').style.display='block';
  document.getElementById('reset-btn').style.display='block';
}

function normalizeData(data){
  if(data.e) return {ngod:data.g||'',sender:data.s||'',receiver:data.r||'',date:data.dt||'',pg:data.p||1,entries:data.e||[]};
  return data;
}

function setStatus(type, msg){
  var el = document.getElementById('status');
  el.className = 'status '+type;
  el.innerHTML = msg;
  el.style.display = 'block';
}

function resetResult(){
  _qrUrl = null;
  _carouselSrcs = []; _carouselIdx = 0;
  document.getElementById('status').style.display='none';
  document.getElementById('result-box').style.display='none';
  document.getElementById('go-btn').style.display='none';
  document.getElementById('reset-btn').style.display='none';
  document.getElementById('carousel-dots').innerHTML='';
}

document.getElementById('go-btn').addEventListener('click', function(){
  if(!_qrUrl) return;
  var imps = Array.isArray(_qrUrl) ? _qrUrl : [_qrUrl.split('import=')[1]].filter(Boolean);
  if(!imps.length) return;
  if(window.parent && window.parent !== window){
    window.parent.postMessage({type:'scanResult', imports: imps}, '*');
  } else {
    // standalone — ส่ง import แรกก่อน (ถ้าหลายรูปต้องใช้ popup)
    window.location.href = 'desktop.html?import=' + imps[0];
  }
});

document.getElementById('reset-btn').addEventListener('click', function(){
  resetResult();
  document.getElementById('preview-wrap').style.display='none';
  document.getElementById('preview-img').src='';
  document.getElementById('file-inp').value='';
  if(_curMode==='cam') startCamera();
});
</script>
</body>
</html>
