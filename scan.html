<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>TIGER 999 — Scan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0f1117;--card:#1a1d27;--card2:#222533;--border:#2e3248;--gold:#f5c518;--gold2:#c9a010;--red:#e74c3c;--white:#f0f2ff;--gray:#6b7280;--lg:#9ca3af;--green:#27ae60;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;}
.logo{font-size:48px;margin-bottom:8px;}
.title{font-size:24px;font-weight:900;color:var(--gold);margin-bottom:4px;}
.sub{font-size:14px;color:var(--lg);margin-bottom:32px;text-align:center;line-height:1.6;}
.upload-zone{width:100%;background:var(--card);border:2px dashed var(--border);border-radius:20px;padding:32px 20px;text-align:center;cursor:pointer;transition:border-color .2s;position:relative;}
.upload-zone.drag{border-color:var(--gold);background:rgba(245,197,24,.06);}
.upload-icon{font-size:52px;margin-bottom:12px;}
.upload-txt{font-size:18px;font-weight:800;color:var(--white);margin-bottom:6px;}
.upload-sub{font-size:13px;color:var(--lg);}
#file-inp{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;}
.preview-wrap{width:100%;margin-top:16px;display:none;}
.preview-img{width:100%;border-radius:14px;border:2px solid var(--border);}
.status{width:100%;margin-top:16px;padding:16px;border-radius:14px;font-size:16px;font-weight:800;text-align:center;display:none;}
.status.scanning{background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.3);color:var(--gold);}
.status.success{background:rgba(39,174,96,.12);border:1px solid rgba(39,174,96,.4);color:#6ee7b7;}
.status.error{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:#fca5a5;}
.result-box{width:100%;margin-top:16px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;display:none;}
.result-title{font-size:13px;font-weight:700;color:var(--lg);margin-bottom:8px;}
.result-info{font-size:15px;font-weight:800;color:var(--white);line-height:1.8;}
.result-info span{color:var(--gold);}
.go-btn{width:100%;margin-top:16px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:14px;color:#111;font-family:'Sarabun',sans-serif;font-size:20px;font-weight:900;padding:16px;cursor:pointer;display:none;}
.reset-btn{width:100%;margin-top:10px;background:var(--card2);border:1px solid var(--border);border-radius:14px;color:var(--lg);font-family:'Sarabun',sans-serif;font-size:16px;font-weight:800;padding:13px;cursor:pointer;display:none;}
.tip{margin-top:24px;font-size:12px;color:var(--gray);text-align:center;line-height:1.7;}
</style>
</head>
<body>
<div class="logo">🐯</div>
<div class="title">TIGER 999 — Scan</div>
<div class="sub">อัพโหลดรูปโพยที่มี QR code<br>ระบบจะนำข้อมูลเข้า desktop อัตโนมัติ</div>

<div class="upload-zone" id="upload-zone">
  <input type="file" id="file-inp" accept="image/*">
  <div class="upload-icon">📷</div>
  <div class="upload-txt">แตะเพื่อเลือกรูป</div>
  <div class="upload-sub">รองรับ JPG, PNG, WebP — รูปจาก Line ได้เลย</div>
</div>

<div class="preview-wrap" id="preview-wrap">
  <img class="preview-img" id="preview-img" src="" alt="">
</div>

<div class="status" id="status"></div>

<div class="result-box" id="result-box">
  <div class="result-title">ข้อมูลที่อ่านได้</div>
  <div class="result-info" id="result-info"></div>
</div>

<button class="go-btn" id="go-btn">🚀 นำเข้า Desktop เลย</button>
<button class="reset-btn" id="reset-btn">🔄 scan รูปใหม่</button>

<div class="tip">💡 ถ่ายรูปให้ QR ชัด ไม่เบลอ<br>หรือ screenshot จาก Line แล้วอัพขึ้นมาได้เลย</div>

<canvas id="qr-canvas" style="display:none;"></canvas>

<script>
var _qrUrl = null;

document.getElementById('file-inp').addEventListener('change', function(e){
  var file = e.target.files[0];
  if(file) handleFile(file);
});

var zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', function(e){ e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', function(){ zone.classList.remove('drag'); });
zone.addEventListener('drop', function(e){
  e.preventDefault(); zone.classList.remove('drag');
  var file = e.dataTransfer.files[0];
  if(file && file.type.startsWith('image/')) handleFile(file);
});

function handleFile(file){
  var reader = new FileReader();
  reader.onload = function(ev){
    var img = document.getElementById('preview-img');
    img.src = ev.target.result;
    document.getElementById('preview-wrap').style.display = 'block';
    document.getElementById('result-box').style.display = 'none';
    document.getElementById('go-btn').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'none';
    setStatus('scanning', '🔍 กำลัง scan QR code...');
    img.onload = function(){ scanQR(img); };
  };
  reader.readAsDataURL(file);
}

function scanQR(img){
  var canvas = document.getElementById('qr-canvas');
  var ctx = canvas.getContext('2d');
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  ctx.drawImage(img, 0, 0);
  var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  var code = jsQR(imageData.data, imageData.width, imageData.height, {inversionAttempts:'dontInvert'});
  if(!code) code = jsQR(imageData.data, imageData.width, imageData.height, {inversionAttempts:'onlyInvert'});

  if(!code){
    setStatus('error', '❌ ไม่พบ QR code ในรูปนี้<br><span style="font-size:13px;font-weight:600;">ลอง crop ให้เห็นเฉพาะ QR หรือถ่ายใหม่</span>');
    document.getElementById('reset-btn').style.display = 'block';
    return;
  }

  var url = code.data;
  if(url.indexOf('tiger999.online') < 0 && url.indexOf('desktop.html') < 0){
    setStatus('error', '❌ QR นี้ไม่ใช่โพย Tiger 999');
    document.getElementById('reset-btn').style.display = 'block';
    return;
  }

  try{
    var imp = url.split('import=')[1];
    if(!imp){ setStatus('error','❌ QR ไม่มีข้อมูล'); return; }
    var data = JSON.parse(decodeURIComponent(escape(atob(imp))));
    var norm = normalizeData(data);
    var cnt = (norm.entries||[]).length;
    document.getElementById('result-info').innerHTML =
      '<span>งวด</span> '+(norm.ngod||'—')+'<br>'
      +'<span>ผู้ส่ง</span> '+(norm.sender||'—')
      +'&nbsp;&nbsp;<span>ผู้รับ</span> '+(norm.receiver||'—')+'<br>'
      +'<span>แผ่น</span> '+(norm.pg||1)
      +'&nbsp;&nbsp;<span>จำนวน</span> '+cnt+' รายการ';
    document.getElementById('result-box').style.display = 'block';
    setStatus('success', '✅ อ่าน QR สำเร็จ! พบ '+cnt+' รายการ');
    _qrUrl = url;
    document.getElementById('go-btn').style.display = 'block';
    document.getElementById('reset-btn').style.display = 'block';
  } catch(err){
    setStatus('error', '❌ อ่านข้อมูลใน QR ไม่ได้');
    document.getElementById('reset-btn').style.display = 'block';
  }
}

function normalizeData(data){
  if(data.e){
    return { ngod:data.g||'', sender:data.s||'', receiver:data.r||'',
             date:data.dt||'', pg:data.p||1, entries:data.e||[] };
  }
  return data;
}

function setStatus(type, msg){
  var el = document.getElementById('status');
  el.className = 'status '+type;
  el.innerHTML = msg;
  el.style.display = 'block';
}

document.getElementById('go-btn').addEventListener('click', function(){
  if(_qrUrl) window.location.href = _qrUrl;
});

document.getElementById('reset-btn').addEventListener('click', function(){
  _qrUrl = null;
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('status').style.display = 'none';
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('go-btn').style.display = 'none';
  document.getElementById('reset-btn').style.display = 'none';
  document.getElementById('preview-img').src = '';
  document.getElementById('file-inp').value = '';
});
</script>
</body>
</html>
